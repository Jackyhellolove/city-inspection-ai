<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>城市巡查 AI 助手</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #172033;
      background: linear-gradient(135deg, #eef5ff, #f8fbff 50%, #eefaf5);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    main {
      width: min(980px, 100%);
      padding: 36px;
      border: 1px solid #dce6f3;
      border-radius: 22px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 22px 60px rgba(31, 72, 118, .14);
    }
    h1 { margin: 0 0 10px; font-size: 30px; }
    .intro { margin: 0 0 28px; color: #647087; }
    label { display: block; margin-bottom: 10px; font-weight: 700; }
    textarea {
      width: 100%;
      min-height: 130px;
      padding: 16px;
      border: 2px solid #8eb6ff;
      border-radius: 12px;
      outline: none;
      resize: vertical;
      font: inherit;
      font-size: 17px;
    }
    textarea:focus { border-color: #1769e0; box-shadow: 0 0 0 4px #1769e01c; }
    .field-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 16px; }
    .field label { margin-bottom: 7px; font-size: 14px; }
    .field input, .field select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd8e8;
      border-radius: 9px;
      background: white;
      color: #172033;
      font: inherit;
    }
    .actions { display: flex; gap: 12px; margin: 18px 0 26px; }
    button {
      padding: 11px 20px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    .primary { color: white; background: #1769e0; }
    .secondary { color: #34425a; background: #edf2f8; }
    .success { color: white; background: #16835d; }
    .results {
      padding: 20px;
      border-radius: 14px;
      background: #f5f8fc;
    }
    .results h2 { margin: 0 0 14px; font-size: 18px; }
    .row { display: grid; grid-template-columns: 100px 1fr; gap: 12px; padding: 9px 0; }
    .name { color: #69758a; }
    .value { font-weight: 700; }
    .history { margin-top: 24px; }
    .history-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .history-head h2 { margin: 0; font-size: 20px; }
    .table-wrap { margin-top: 14px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 11px 9px; border-bottom: 1px solid #e3e9f1; text-align: left; white-space: nowrap; }
    th { color: #69758a; font-weight: 600; }
    td:first-child { max-width: 260px; white-space: normal; }
    .empty { padding: 22px 0; color: #7b879b; text-align: center; }
    .notice { min-height: 22px; margin: 10px 0 0; color: #16835d; font-size: 14px; }
    .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin: 24px 0 14px; }
    .stat { padding: 16px; border: 1px solid #e1e8f1; border-radius: 12px; background: white; }
    .stat strong { display: block; margin-top: 5px; font-size: 24px; }
    .stat span { color: #6f7b8f; font-size: 13px; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 26px; }
    .chart-card { padding: 18px; border: 1px solid #e1e8f1; border-radius: 14px; background: #fbfdff; }
    .chart-card h2 { margin: 0 0 16px; font-size: 17px; }
    .progress-track { height: 14px; overflow: hidden; border-radius: 999px; background: #e9eef5; }
    .progress-value { height: 100%; width: 0; border-radius: inherit; background: linear-gradient(90deg, #16835d, #25ad7d); transition: width .3s ease; }
    .progress-label { display: flex; justify-content: space-between; margin-top: 9px; color: #637087; font-size: 13px; }
    .bars { display: grid; gap: 11px; }
    .bar-row { display: grid; grid-template-columns: 86px 1fr 32px; align-items: center; gap: 9px; font-size: 13px; }
    .bar-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { height: 10px; overflow: hidden; border-radius: 999px; background: #e9eef5; }
    .bar-value { height: 100%; border-radius: inherit; background: #4f86e8; }
    .chart-empty { color: #7b879b; font-size: 14px; }
    .filters { display: grid; grid-template-columns: 1fr 150px 150px; gap: 12px; margin-top: 14px; }
    .filters input, .filters select { padding: 10px 12px; border: 1px solid #cbd8e8; border-radius: 9px; font: inherit; }
    .delete { padding: 7px 10px; color: #b42318; background: #fff0ee; }
    .edit { padding: 7px 10px; color: #1557a6; background: #edf5ff; }
    .row-actions { display: flex; gap: 7px; }
    .data-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .deadline { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .deadline-normal { color: #536179; background: #eef2f7; }
    .deadline-soon { color: #8a4b08; background: #fff3d6; }
    .deadline-overdue { color: #b42318; background: #fff0ee; }
    .deadline-done { color: #116548; background: #e8f7f0; }
    .photo-picker { display: flex; align-items: center; gap: 12px; margin-top: 16px; padding: 12px; border: 1px dashed #b9c9dc; border-radius: 12px; background: #f8fbff; }
    .photo-picker input { max-width: 260px; }
    .photo-preview, .photo-thumb { object-fit: cover; border-radius: 8px; background: #edf2f8; }
    .photo-preview { width: 72px; height: 72px; }
    .photo-thumb { width: 54px; height: 54px; cursor: zoom-in; }
    .photo-remove { padding: 7px 10px; color: #b42318; background: #fff0ee; }
    dialog { width: min(900px, 92vw); padding: 14px; border: 0; border-radius: 16px; box-shadow: 0 24px 80px #17203355; }
    dialog::backdrop { background: #172033aa; }
    dialog img { display: block; width: 100%; max-height: 78vh; object-fit: contain; border-radius: 10px; }
    .dialog-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
    @media (max-width: 680px) {
      main { padding: 24px; }
      .field-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .dashboard { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr; }
      .actions { flex-wrap: wrap; }
    }
    @media print {
      body { display: block; padding: 0; background: white; }
      main { width: 100%; padding: 0; border: 0; box-shadow: none; }
      textarea, .field-grid, .photo-picker, .actions, .notice, .filters, .data-actions, .row-actions, dialog { display: none !important; }
      .history { margin-top: 18px; }
      table { font-size: 11px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>城市巡查 AI 助手</h1>
    <p class="intro">输入巡查现场发现的问题，系统将给出初步分类和处置建议。</p>

    <label for="issue">巡查问题</label>
    <textarea id="issue" placeholder="例如：发现道路井盖缺失">发现道路井盖缺失</textarea>

    <div class="field-grid">
      <div class="field">
        <label for="location">发现地点</label>
        <input id="location" placeholder="例如：和平路与胜利街路口">
      </div>
      <div class="field">
        <label for="owner">负责人</label>
        <input id="owner" placeholder="例如：张三">
      </div>
      <div class="field">
        <label for="status">处置状态</label>
        <select id="status">
          <option>待派单</option>
          <option>处理中</option>
          <option>已完成</option>
        </select>
      </div>
      <div class="field">
        <label for="deadline">完成期限</label>
        <input id="deadline" type="date">
      </div>
    </div>

    <div class="photo-picker">
      <div class="field">
        <label for="photo">现场照片（可选）</label>
        <input id="photo" type="file" accept="image/*" capture="environment">
      </div>
      <img class="photo-preview" id="photoPreview" alt="现场照片预览" hidden>
      <button class="photo-remove" id="removePhoto" type="button" hidden>移除照片</button>
    </div>

    <div class="actions">
      <button class="primary" id="analyze">开始识别</button>
      <button class="success" id="save">保存记录</button>
      <button class="secondary" id="clear">清空输入</button>
    </div>

    <section class="results" aria-live="polite">
      <h2>识别结果</h2>
      <div class="row"><span class="name">问题类型</span><span class="value" id="type">等待识别</span></div>
      <div class="row"><span class="name">处理部门</span><span class="value" id="department">等待识别</span></div>
      <div class="row"><span class="name">优先级</span><span class="value" id="priority">等待识别</span></div>
    </section>

    <p class="notice" id="notice" aria-live="polite"></p>

    <section class="stats" aria-label="巡查状态统计">
      <div class="stat"><span>全部问题</span><strong id="totalCount">0</strong></div>
      <div class="stat"><span>待派单</span><strong id="pendingCount">0</strong></div>
      <div class="stat"><span>处理中</span><strong id="processingCount">0</strong></div>
      <div class="stat"><span>已完成</span><strong id="completedCount">0</strong></div>
      <div class="stat"><span>办结率</span><strong id="completionRate">0%</strong></div>
      <div class="stat"><span>已逾期</span><strong id="overdueCount">0</strong></div>
    </section>

    <section class="dashboard" aria-label="巡查数据看板">
      <div class="chart-card">
        <h2>问题办结进度</h2>
        <div class="progress-track" aria-hidden="true"><div class="progress-value" id="completionBar"></div></div>
        <div class="progress-label"><span id="completionText">尚无巡查记录</span><span id="completionRatio">0 / 0</span></div>
      </div>
      <div class="chart-card">
        <h2>问题类型分布</h2>
        <div class="bars" id="typeChart"><span class="chart-empty">尚无巡查记录</span></div>
      </div>
    </section>

    <section class="history">
      <div class="history-head">
        <h2>巡查记录</h2>
        <button class="secondary" id="export">导出 CSV 表格</button>
      </div>
      <div class="data-actions">
        <button class="secondary" id="backup">备份全部数据</button>
        <button class="secondary" id="restore">恢复备份</button>
        <button class="secondary" id="printReport">打印巡查报告</button>
        <input id="restoreFile" type="file" accept="application/json,.json" hidden>
      </div>
      <div class="filters">
        <input id="search" aria-label="搜索巡查记录" placeholder="搜索编号、描述、地点或负责人">
        <select id="statusFilter" aria-label="按处置状态筛选">
          <option value="">全部状态</option>
          <option>待派单</option>
          <option>处理中</option>
          <option>已完成</option>
        </select>
        <select id="deadlineFilter" aria-label="按期限状态筛选">
          <option value="">全部期限</option>
          <option value="overdue">已逾期</option>
          <option value="soon">即将到期</option>
          <option value="normal">期限正常</option>
          <option value="none">未设期限</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>问题编号</th><th>现场照片</th><th>问题描述</th><th>发现地点</th><th>问题类型</th><th>处理部门</th><th>优先级</th><th>负责人</th><th>处置状态</th><th>完成期限</th><th>更新时间</th><th>操作</th></tr></thead>
          <tbody id="records"></tbody>
        </table>
        <div class="empty" id="empty">暂时没有保存的记录</div>
      </div>
    </section>
  </main>
  <dialog id="photoDialog">
    <img id="photoLarge" alt="现场照片大图">
    <div class="dialog-actions"><button class="secondary" id="closePhoto" type="button">关闭</button></div>
  </dialog>
  <script>
    const issue = document.querySelector('#issue');
    const output = {
      type: document.querySelector('#type'),
      department: document.querySelector('#department'),
      priority: document.querySelector('#priority')
    };
    const notice = document.querySelector('#notice');
    const locationInput = document.querySelector('#location');
    const ownerInput = document.querySelector('#owner');
    const statusInput = document.querySelector('#status');
    const deadlineInput = document.querySelector('#deadline');
    const photoInput = document.querySelector('#photo');
    const photoPreview = document.querySelector('#photoPreview');
    const removePhotoButton = document.querySelector('#removePhoto');
    const photoDialog = document.querySelector('#photoDialog');
    const photoLarge = document.querySelector('#photoLarge');
    const searchInput = document.querySelector('#search');
    const statusFilter = document.querySelector('#statusFilter');
    const deadlineFilter = document.querySelector('#deadlineFilter');
    const recordBody = document.querySelector('#records');
    const empty = document.querySelector('#empty');
    const storageKey = 'city-inspection-records';
    let photoData = '';

    function includesAny(text, words) { return words.some(word => text.includes(word)); }

    function classify(text) {
      text = text.trim();
      if (!text) return ['无法识别', '待人工确认', '待确认'];
      if (includesAny(text, ['垃圾', '落叶', '污水', '保洁'])) return ['环境卫生', '环卫部门', '一般'];
      if (includesAny(text, ['井盖', '路灯', '护栏', '道路破损'])) return ['市政设施', '市政管理部门', '较高'];
      if (includesAny(text, ['树木倒伏', '树枝断裂', '绿化带'])) return ['园林绿化', '园林部门', '较高'];
      return ['其他问题', '城市管理部门', '一般'];
    }

    function getRecords() {
      try { return JSON.parse(localStorage.getItem(storageKey)) || []; }
      catch { return []; }
    }

    function showNotice(message) {
      notice.textContent = message;
      window.setTimeout(() => { notice.textContent = ''; }, 2500);
    }

    function createRecordId(records) {
      const date = new Date();
      const day = [date.getFullYear(), String(date.getMonth() + 1).padStart(2, '0'), String(date.getDate()).padStart(2, '0')].join('');
      const count = records.filter(record => String(record.id || '').startsWith(`XC-${day}-`)).length + 1;
      return `XC-${day}-${String(count).padStart(3, '0')}`;
    }

    function getDeadlineState(record) {
      if ((record.status || '待派单') === '已完成') return 'done';
      if (!record.deadline) return 'none';
      const end = new Date(`${record.deadline}T23:59:59`);
      if (end < new Date()) return 'overdue';
      const remainingDays = Math.ceil((end - new Date()) / 86400000);
      if (remainingDays <= 2) return 'soon';
      return 'normal';
    }

    function renderDeadline(record) {
      const state = getDeadlineState(record);
      if (state === 'none') return '<span class="deadline deadline-normal">未设置</span>';
      if (state === 'done') return `<span class="deadline deadline-done">${escapeHtml(record.deadline || '已办结')}</span>`;
      if (state === 'overdue') return `<span class="deadline deadline-overdue">${escapeHtml(record.deadline)} · 已逾期</span>`;
      if (state === 'soon') return `<span class="deadline deadline-soon">${escapeHtml(record.deadline)} · 即将到期</span>`;
      return `<span class="deadline deadline-normal">${escapeHtml(record.deadline)}</span>`;
    }

    function safePhoto(value) {
      return typeof value === 'string' && value.startsWith('data:image/jpeg;base64,') ? value : '';
    }

    function compressPhoto(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = () => {
          const image = new Image();
          image.onerror = reject;
          image.onload = () => {
            const scale = Math.min(1, 960 / Math.max(image.width, image.height));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            canvas.getContext('2d').drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', .72));
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderRecords() {
      const records = getRecords();
      const keyword = searchInput.value.trim().toLowerCase();
      const selectedStatus = statusFilter.value;
      const selectedDeadline = deadlineFilter.value;
      const visibleRecords = records
        .map((record, index) => ({ ...record, storageIndex: index }))
        .filter(record => {
          const searchable = [record.id, record.description, record.location, record.owner].join(' ').toLowerCase();
          const status = record.status || '待派单';
          const deadlineState = getDeadlineState(record);
          return (!keyword || searchable.includes(keyword))
            && (!selectedStatus || status === selectedStatus)
            && (!selectedDeadline || deadlineState === selectedDeadline);
        });

      const pendingCount = records.filter(record => (record.status || '待派单') === '待派单').length;
      const processingCount = records.filter(record => record.status === '处理中').length;
      const completedCount = records.filter(record => record.status === '已完成').length;
      const completionRate = records.length ? Math.round(completedCount / records.length * 100) : 0;
      const overdueCount = records.filter(record => getDeadlineState(record) === 'overdue').length;
      document.querySelector('#totalCount').textContent = records.length;
      document.querySelector('#pendingCount').textContent = pendingCount;
      document.querySelector('#processingCount').textContent = processingCount;
      document.querySelector('#completedCount').textContent = completedCount;
      document.querySelector('#completionRate').textContent = `${completionRate}%`;
      document.querySelector('#overdueCount').textContent = overdueCount;
      document.querySelector('#completionBar').style.width = `${completionRate}%`;
      document.querySelector('#completionText').textContent = records.length ? `已完成 ${completionRate}%` : '尚无巡查记录';
      document.querySelector('#completionRatio').textContent = `${completedCount} / ${records.length}`;

      const typeCounts = records.reduce((counts, record) => {
        const type = record.type || '其他问题';
        counts[type] = (counts[type] || 0) + 1;
        return counts;
      }, {});
      const maxTypeCount = Math.max(0, ...Object.values(typeCounts));
      document.querySelector('#typeChart').innerHTML = records.length
        ? Object.entries(typeCounts).sort((a, b) => b[1] - a[1]).map(([type, count]) => `
          <div class="bar-row">
            <span class="bar-label" title="${escapeHtml(type)}">${escapeHtml(type)}</span>
            <div class="bar-track" aria-hidden="true"><div class="bar-value" style="width:${count / maxTypeCount * 100}%"></div></div>
            <strong>${count}</strong>
          </div>`).join('')
        : '<span class="chart-empty">尚无巡查记录</span>';

      empty.textContent = records.length ? '没有符合筛选条件的记录' : '暂时没有保存的记录';
      empty.hidden = visibleRecords.length > 0;
      recordBody.innerHTML = visibleRecords.map(record => `
        <tr>
          <td>${escapeHtml(record.id || '历史记录')}</td>
          <td>${safePhoto(record.photo) ? `<img class="photo-thumb" src="${safePhoto(record.photo)}" alt="${escapeHtml(record.id || '巡查记录')}现场照片" data-photo-index="${record.storageIndex}">` : '无'}</td>
          <td>${escapeHtml(record.description)}</td>
          <td>${escapeHtml(record.location || '未填写')}</td>
          <td>${escapeHtml(record.type)}</td>
          <td>${escapeHtml(record.department)}</td>
          <td>${escapeHtml(record.priority)}</td>
          <td>${escapeHtml(record.owner || '未指定')}</td>
          <td>${escapeHtml(record.status || '待派单')}</td>
          <td>${renderDeadline(record)}</td>
          <td>${escapeHtml(record.updatedAt || record.time)}</td>
          <td><div class="row-actions"><button class="edit" data-index="${record.storageIndex}">编辑</button><button class="delete" data-index="${record.storageIndex}">删除</button></div></td>
        </tr>`).join('');
    }

    function escapeHtml(value) {
      const element = document.createElement('div');
      element.textContent = value;
      return element.innerHTML;
    }

    document.querySelector('#analyze').addEventListener('click', () => {
      const [type, department, priority] = classify(issue.value);
      output.type.textContent = type;
      output.department.textContent = department;
      output.priority.textContent = priority;
    });

    document.querySelector('#clear').addEventListener('click', () => {
      issue.value = '';
      locationInput.value = '';
      ownerInput.value = '';
      statusInput.value = '待派单';
      deadlineInput.value = '';
      photoInput.value = '';
      photoData = '';
      photoPreview.hidden = true;
      removePhotoButton.hidden = true;
      Object.values(output).forEach(element => element.textContent = '等待识别');
      issue.focus();
    });

    document.querySelector('#save').addEventListener('click', () => {
      const description = issue.value.trim();
      if (!description) { showNotice('请先输入巡查问题'); issue.focus(); return; }
      const [type, department, priority] = classify(description);
      output.type.textContent = type;
      output.department.textContent = department;
      output.priority.textContent = priority;
      const records = getRecords();
      records.unshift({
        id: createRecordId(records),
        description,
        location: locationInput.value.trim(),
        type,
        department,
        priority,
        owner: ownerInput.value.trim(),
        status: statusInput.value,
        deadline: deadlineInput.value,
        photo: photoData,
        time: new Date().toLocaleString('zh-CN')
      });
      try {
        localStorage.setItem(storageKey, JSON.stringify(records));
      } catch {
        showNotice('照片占用空间较大，保存失败；请移除照片后重试');
        return;
      }
      renderRecords();
      photoData = '';
      photoInput.value = '';
      photoPreview.hidden = true;
      removePhotoButton.hidden = true;
      showNotice('巡查记录已保存到当前浏览器');
    });

    document.querySelector('#export').addEventListener('click', () => {
      const records = getRecords();
      if (!records.length) { showNotice('没有可导出的巡查记录'); return; }
      const quote = value => `"${String(value).replaceAll('"', '""')}"`;
      const rows = [
        ['问题编号', '现场照片', '问题描述', '发现地点', '问题类型', '处理部门', '优先级', '负责人', '处置状态', '完成期限', '期限状态', '创建时间', '更新时间'],
        ...records.map(record => [
          record.id || '历史记录', safePhoto(record.photo) ? '有' : '无', record.description, record.location || '', record.type,
          record.department, record.priority, record.owner || '', record.status || '待派单', record.deadline || '', getDeadlineState(record), record.time,
          record.updatedAt || record.time
        ])
      ];
      const csv = '\ufeff' + rows.map(row => row.map(quote).join(',')).join('\r\n');
      const link = document.createElement('a');
      link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
      link.download = `城市巡查记录-${new Date().toISOString().slice(0, 10)}.csv`;
      link.click();
      URL.revokeObjectURL(link.href);
      showNotice('CSV 表格已导出');
    });

    document.querySelector('#backup').addEventListener('click', () => {
      const records = getRecords();
      const payload = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), records }, null, 2);
      const link = document.createElement('a');
      link.href = URL.createObjectURL(new Blob([payload], { type: 'application/json' }));
      link.download = `城市巡查数据备份-${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
      showNotice('完整数据备份已下载');
    });

    const restoreFile = document.querySelector('#restoreFile');
    document.querySelector('#restore').addEventListener('click', () => restoreFile.click());
    restoreFile.addEventListener('change', async () => {
      const file = restoreFile.files[0];
      if (!file) return;
      try {
        const data = JSON.parse(await file.text());
        if (!data || data.version !== 1 || !Array.isArray(data.records)) throw new Error('invalid backup');
        if (!window.confirm(`备份中有 ${data.records.length} 条记录。确定与当前台账合并吗？`)) return;
        const current = getRecords();
        const keys = new Set(current.map(record => record.id || `${record.description}|${record.time}`));
        const imported = data.records.filter(record => {
          const key = record.id || `${record.description}|${record.time}`;
          if (!record.description || keys.has(key)) return false;
          keys.add(key);
          return true;
        });
        localStorage.setItem(storageKey, JSON.stringify([...current, ...imported]));
        renderRecords();
        showNotice(`成功恢复 ${imported.length} 条新记录`);
      } catch {
        showNotice('备份文件格式不正确，未导入任何数据');
      } finally {
        restoreFile.value = '';
      }
    });

    document.querySelector('#printReport').addEventListener('click', () => window.print());

    photoInput.addEventListener('change', async () => {
      const file = photoInput.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { showNotice('请选择图片文件'); return; }
      showNotice('正在处理现场照片…');
      try {
        photoData = await compressPhoto(file);
        photoPreview.src = photoData;
        photoPreview.hidden = false;
        removePhotoButton.hidden = false;
        showNotice('现场照片已准备好');
      } catch {
        photoData = '';
        showNotice('照片读取失败，请重新选择');
      }
    });

    removePhotoButton.addEventListener('click', () => {
      photoData = '';
      photoInput.value = '';
      photoPreview.hidden = true;
      removePhotoButton.hidden = true;
      showNotice('现场照片已移除');
    });

    recordBody.addEventListener('click', event => {
      const thumbnail = event.target.closest('[data-photo-index]');
      if (!thumbnail) return;
      const photo = safePhoto(getRecords()[Number(thumbnail.dataset.photoIndex)]?.photo);
      if (!photo) return;
      photoLarge.src = photo;
      photoDialog.showModal();
    });
    document.querySelector('#closePhoto').addEventListener('click', () => photoDialog.close());

    searchInput.addEventListener('input', renderRecords);
    statusFilter.addEventListener('change', renderRecords);
    deadlineFilter.addEventListener('change', renderRecords);
    recordBody.addEventListener('click', event => {
      const button = event.target.closest('button[data-index]');
      if (!button) return;
      const records = getRecords();
      const index = Number(button.dataset.index);

      if (button.classList.contains('edit')) {
        const record = records[index];
        const description = window.prompt('修改问题描述', record.description);
        if (description === null) return;
        const location = window.prompt('修改发现地点', record.location || '');
        if (location === null) return;
        const owner = window.prompt('修改负责人', record.owner || '');
        if (owner === null) return;
        const status = window.prompt('修改处置状态：待派单、处理中或已完成', record.status || '待派单');
        if (status === null) return;
        if (!['待派单', '处理中', '已完成'].includes(status.trim())) {
          showNotice('处置状态只能填写：待派单、处理中或已完成');
          return;
        }
        const deadline = window.prompt('修改完成期限（格式：年-月-日，留空表示不设置）', record.deadline || '');
        if (deadline === null) return;
        if (deadline.trim() && !/^\d{4}-\d{2}-\d{2}$/.test(deadline.trim())) {
          showNotice('完成期限格式应为：年-月-日');
          return;
        }
        const [type, department, priority] = classify(description);
        records[index] = {
          ...record,
          description: description.trim() || record.description,
          location: location.trim(),
          owner: owner.trim(),
          status: status.trim(),
          deadline: deadline.trim(),
          type,
          department,
          priority,
          updatedAt: new Date().toLocaleString('zh-CN')
        };
        localStorage.setItem(storageKey, JSON.stringify(records));
        renderRecords();
        showNotice('巡查记录已更新');
        return;
      }

      if (!window.confirm('确定删除这条巡查记录吗？')) return;
      records.splice(index, 1);
      localStorage.setItem(storageKey, JSON.stringify(records));
      renderRecords();
      showNotice('巡查记录已删除');
    });

    renderRecords();
  </script>
</body>
</html>
